<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <style>
    .actor { fill: #f9fafb; stroke: #1f2937; stroke-width: 2; }
    .usecase { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 24; ry: 24; }
    .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 18px; }
    .title { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 26px; font-weight: bold; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 16px; }
    .line { stroke: #334155; stroke-width: 2; }
  </style>

  <rect x="20" y="20" width="860" height="610" rx="28" ry="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="60" class="title">Admin Passcode Access Use Case</text>
  <text x="60" y="90" class="subtitle">Secure admin access with a single shared passcode and dashboard management actions.</text>

  <g>
    <rect class="actor" x="60" y="140" width="180" height="120" rx="20" ry="20" />
    <text x="150" y="190" class="label" text-anchor="middle">School Admin</text>
    <text x="150" y="215" class="label" text-anchor="middle">(Primary Actor)</text>
  </g>

  <g>
    <ellipse class="usecase" cx="520" cy="180" rx="210" ry="60" />
    <text x="520" y="170" class="label" text-anchor="middle">Enter Passcode</text>
    <text x="520" y="190" class="label" text-anchor="middle">and Gain Access</text>
  </g>

  <g>
    <ellipse class="usecase" cx="520" cy="300" rx="220" ry="60" />
    <text x="520" y="290" class="label" text-anchor="middle">View Admin Dashboard</text>
    <text x="520" y="310" class="label" text-anchor="middle">(Students / Courses / Enrollments)</text>
  </g>

  <g>
    <ellipse class="usecase" cx="520" cy="420" rx="210" ry="60" />
    <text x="520" y="410" class="label" text-anchor="middle">Manage Records</text>
    <text x="520" y="430" class="label" text-anchor="middle">(Add students, courses, enrollments)</text>
  </g>

  <g>
    <ellipse class="usecase" cx="520" cy="540" rx="210" ry="60" />
    <text x="520" y="530" class="label" text-anchor="middle">Logout</text>
    <text x="520" y="550" class="label" text-anchor="middle">Clear session and return to passcode</text>
  </g>

  <line x1="240" y1="200" x2="310" y2="180" class="line" />
  <line x1="240" y1="240" x2="310" y2="300" class="line" />
  <line x1="240" y1="280" x2="310" y2="420" class="line" />
  <line x1="240" y1="320" x2="310" y2="540" class="line" />

  <text x="360" y="180" class="label">passes passcode</text>
  <text x="360" y="300" class="label">access granted</text>
  <text x="360" y="420" class="label">use dashboard tools</text>
  <text x="360" y="540" class="label">end secure session</text>
</svg>
